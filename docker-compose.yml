version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: haris-postgres
    environment:
      POSTGRES_USER: haris_user
      POSTGRES_PASSWORD: haris_password
      POSTGRES_DB: haris_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haris_user -d haris_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: haris-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  typesense:
    image: typesense/typesense:27.1
    container_name: haris-typesense
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: xyz
      TYPESENSE_ENABLE_CORS: "true"
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: haris-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://haris_user:haris_password@postgres:5432/haris_db
      REDIS_URL: redis://redis:6379
      TYPESENSE_HOST: http://typesense:8108
      TYPESENSE_API_KEY: xyz
      JWT_SECRET: change_me_in_production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      typesense:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: haris-frontend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  typesense_data:
